name: CI / CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: opspilot-ai
  EKS_CLUSTER: opspilot-cluster
  HELM_RELEASE: opspilot
  HELM_NAMESPACE: opspilot

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      APP_ENV: development
      GOOGLE_API_KEY: dummy-key-for-unit-tests
      AUDIT_BACKEND: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/test_audit.py tests/test_eval_metrics.py -v --tb=short

  # ── 3. Integration tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: development
      GOOGLE_API_KEY: dummy-key-for-tests
      AUDIT_BACKEND: local
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short

  # ── 4. Build & push Docker image to ECR ──────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    # Only run on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f infra/Dockerfile \
            -t "${{ steps.meta.outputs.uri }}" \
            -t "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            .

      - name: Push to ECR
        run: |
          docker push "${{ steps.meta.outputs.uri }}"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"

  # ── 5. Deploy to EKS (main branch only) ──────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://opspilot.your-domain.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Get ECR registry
        id: ecr
        run: |
          REGISTRY=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --query 'repositories[0].repositoryUri' \
            --output text | cut -d'/' -f1)
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} infra/helm/opspilot \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --set image.repository="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}" \
            --set image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
            --set env.APP_ENV=production \
            --wait \
            --timeout 5m \
            --atomic

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }} \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --timeout=3m

      - name: Post deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.build-and-push.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ env.EKS_CLUSTER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | ${{ env.HELM_NAMESPACE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
