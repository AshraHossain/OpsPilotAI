name: CI Pipeline (Fail Demo)

# ── PURPOSE ───────────────────────────────────────────────────────────────────
# This workflow is INTENTIONALLY broken for testing the CI/CD Monitor agent.
# Trigger it manually to produce a failed workflow_run event that the agent
# will analyze.  Do NOT use this in production.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:   # manual trigger only

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest
      - name: Run unit tests
        run: pytest tests/ -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # ── DELIBERATELY BROKEN: no postgres service, connection will be refused ──
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest psycopg2-binary
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
        run: |
          echo "Attempting to connect to database..."
          python -c "
          import psycopg2
          conn = psycopg2.connect(host='localhost', port=5432, dbname='testdb', user='postgres', password='testpass')
          print('Connected!')
          "
        # ^ This will fail: ConnectionRefusedError — no postgres service declared

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    # ── SKIPPED because integration-tests fails ──
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: echo "Deploying to staging..."
