# Horizontal Pod Autoscaler — watched by Infra Scaler agent
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sample-api-hpa
  namespace: opspilot-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sample-api
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
