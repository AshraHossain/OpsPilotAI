version: "3.9"

services:
  # ── OpsPilot API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: opspilot-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: opspilot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # ── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: opspilot-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped

  # ── Grafana (optional dashboard) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: opspilot-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
