# infra/eks/external-secrets.yaml
# ---------------------------------
# Pulls secrets from AWS Secrets Manager into K8s Secrets
# using the External Secrets Operator (ESO).
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace
#
# Then apply:
#   kubectl apply -f infra/eks/external-secrets.yaml

---
# ClusterSecretStore — defines how ESO authenticates to AWS
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: opspilot-sa
            namespace: opspilot

---
# ExternalSecret — maps Secrets Manager keys to a K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: opspilot-external-secret
  namespace: opspilot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: opspilot-secrets   # K8s Secret name (matches Helm chart secretRef.name)
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    # GOOGLE_API_KEY — stored at Secrets Manager path: opspilot/google-api-key
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: opspilot/google-api-key
        property: GOOGLE_API_KEY

    # GITHUB_TOKEN — stored at: opspilot/github
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: opspilot/github
        property: GITHUB_TOKEN

    # GITHUB_WEBHOOK_SECRET — stored at: opspilot/github
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef:
        key: opspilot/github
        property: GITHUB_WEBHOOK_SECRET

# ── How to create the secrets in AWS Secrets Manager ─────────────────────────
#
#   aws secretsmanager create-secret \
#     --name opspilot/google-api-key \
#     --secret-string '{"GOOGLE_API_KEY":"AIza..."}'
#
#   aws secretsmanager create-secret \
#     --name opspilot/github \
#     --secret-string '{"GITHUB_TOKEN":"ghp_...","GITHUB_WEBHOOK_SECRET":"..."}'
#
# After applying this manifest, ESO will auto-create the K8s secret:
#   kubectl get secret opspilot-secrets -n opspilot -o yaml
