global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "deployment"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "opspilot-webhook"

receivers:
  - name: "opspilot-webhook"
    webhook_configs:
      - url: "http://api:8000/webhook/alertmanager"
        send_resolved: true
